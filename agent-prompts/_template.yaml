# ============================================================
# AI Migration Tool — Job File Template
# ============================================================
# Copy this file, fill in your values, then run:
#   python run_agent.py --job agent-prompts/your-job.yaml
#
# Naming convention: migrate-<FeatureName>[-<target>].yaml
# ============================================================

job:
  name: "Migrate <FeatureName>"
  description: >
    Short description of what this migration job does.

pipeline:
  # REQUIRED — absolute path to the legacy feature folder.
  # Replace with your actual source codebase path. Examples:
  #   Windows:    "<FEATURE_ROOT_WINDOWS>"
  #   macOS/Linux: "<FEATURE_ROOT_UNIX>"
  # Tip: run the setup wizard to auto-detect paths — python run_agent.py --setup
  feature_root: "<YOUR_SOURCE_ROOT>/src/<FeatureName>"

  # REQUIRED — human-readable name (used in filenames and logs)
  feature_name: "<FeatureName>"

  # Pipeline mode: scope | plan | full
  mode: "plan"

  # Target stack: simpler_grants | hrsa_pprs
  target: "simpler_grants"

  # Output directory (null = default output/<feature_name>/)
  output_root: null

  # true = no files written, logs only
  dry_run: false

  # true = skip human approval (TESTING ONLY)
  auto_approve: false

  # true = ignore completed-run cache, re-run from scratch
  force: false

  # OPTIONAL — absolute path to the target codebase root.
  # Used by Stage 7 (Integration) to place converted files into the target repo.
  # Auto-populated from config/wizard-registry.json when registered via the setup wizard.
  # Set explicitly here to override, or leave null to rely on auto-population.
  target_root: null

# ── Integration (Stage 7) ──────────────────────────────────────────────────
# Runs after validation. Places output files into target_root, syncs
# dependencies, updates barrel files and __init__.py exports, verifies
# structural alignment, generates migration scripts, and optionally runs a
# post-placement build command.
integration:
  enabled: true            # set false to skip Stage 7 entirely
  add_dependencies: true   # auto-add missing Python deps to requirements.txt
  generate_migration: true # generate DB migration script if model changes detected

  # ── New build-integration options ──────────────────────────────────────
  # Write missing JS packages to package.json dependencies (version="*").
  # You still need to run `npm install` afterward. Default: false (report only).
  update_package_json: false

  # Update the nearest index.ts in each destination directory to export the
  # newly placed TypeScript/React module. Creates index.ts if missing.
  update_barrel_files: true

  # Append `from . import <module>` to __init__.py in each destination directory
  # for newly placed Python files. Creates __init__.py if missing.
  update_python_inits: true

  # Add path aliases to tsconfig.json compilerOptions.paths for new directories.
  # Opt-in (false by default) because it modifies a shared project config file.
  update_tsconfig_paths: false

  # Shell command to run in target_root after all files are placed.
  # Useful for verifying the build still compiles. Examples:
  #   "npm run build"    — TypeScript / Next.js build
  #   "tsc --noEmit"     — TypeScript type-check only
  #   "python -m pytest" — Python test suite
  # Leave null to skip. Command is skipped if any placement conflict occurred.
  post_placement_command: null

  # Timeout in seconds for post_placement_command (default: 300)
  post_placement_timeout: 300

  # Generate minimal Playwright E2E test stubs for each placed TSX/JSX component.
  # Stubs are written to target_root/tests/e2e/<ComponentName>.spec.ts.
  # Opt-in (false by default). Pair with verification.tool: playwright to run them.
  generate_playwright_stubs: false

# ── UI Consistency Audit (Stage 6b) ───────────────────────────────────────
# Compares Angular source template against converted React/TSX output.
# Diffs CSS classes, HTML elements, event bindings, and structural directives.
# Option C: set generate_stories: true to emit Storybook .stories.tsx stubs.
ui_consistency:
  enabled: true                  # set false to skip Stage 6b entirely
  generate_stories: false        # true = emit .stories.tsx stub per UI component
  fail_on_missing_classes: true  # true = FAIL if CSS classes are dropped

# Stage 8: command-based end-to-end verification (build/test/lint)
# Commands are auto-detected from the target codebase (package.json / pyproject.toml /
# Makefile) and verification.enabled is flipped to true automatically when found.
# Override by setting commands and enabled explicitly below.
#
# Playwright mode: set tool: playwright to auto-detect playwright.config.ts/js
# in target_root and run `npx playwright test --reporter=list` automatically.
# (requires integration.generate_playwright_stubs: true or pre-existing specs)
verification:
  enabled: false           # auto-set to true when commands are auto-detected
  tool: commands           # commands (default) | playwright
  cwd: null                # null => target_root (auto-resolved); set explicitly to override
  commands: []             # leave empty for auto-detection, or specify explicitly
  env: {}
  fail_on_error: true

llm:
  # null = auto-detect from environment variables
  provider: null   # anthropic | openai | openai_compat | ollama | llamacpp

  # null = provider default (claude-opus-4-5 / gpt-4o / llama3.2)
  model: null

  # true = template-only mode, no API key required
  no_llm: false

  # Optional — only set if needed
  base_url: null
  model_path: null
  ollama_host: null
  max_tokens: null
  temperature: null

# ── Orchestration ──────────────────────────────────────────────────────────
# enabled: true  = LLM-driven orchestrator (dynamic workflow + auto-retry)
# enabled: false = fixed sequential pipeline (default, backwards-compatible)
orchestration:
  enabled: false           # true = LLM orchestrator; false = sequential pipeline
  learning: true           # always extract patterns + preferences after each run
  max_plan_revisions: 2    # max auto-revisions the orchestrator can trigger
  escalate_on_fail: true   # ask human if orchestrator cannot resolve ambiguity
  backend: internal        # internal | google_adk
  tool_use: auto           # auto | never  (auto = use native tool-use if provider supports it)

notes: |
  Add any context the agent or human reviewer should know:
  - Business domain of this feature
  - Known platform library dependencies (pfm-*, Platform.*)
  - Cross-feature imports that need human review
  - Expected output files
