# ============================================================
# AI Migration Tool -- Job File Template
# Target: hrsa-simpler-pprs (Next.js / Flask)
# Generated by: setup_wizard.py on 2026-03-03
# ============================================================
# Copy this file, fill in your values, then run:
#   python run_agent.py --job agent-prompts/your-job.yaml
#
# Naming convention: migrate-Commands-hrsa_simpler_pprs_repo.yaml
# ============================================================

job:
  name: "Migrate Commands -> hrsa-simpler-pprs"
  description: >
    Migrate the Commands feature from
    React / ASP.NET Core to
    Next.js / Flask.

pipeline:
  # REQUIRED -- absolute path to the legacy feature folder.
  # Replace <YOUR_SOURCE_ROOT> with your local source codebase path. Examples:
  #   Windows:     "<FEATURE_ROOT_WINDOWS>"
  #   macOS/Linux: "<FEATURE_ROOT_UNIX>"
  feature_root: "<FEATURE_ROOT>"

  # REQUIRED -- human-readable name (used in filenames and logs)
  feature_name: "Commands"

  # Pipeline mode: scope | plan | full
  mode: "full"

  # Target stack identifier (registered by setup_wizard.py)
  target: "hrsa_simpler_pprs_repo"

  # Output directory (null = default output/<feature_name>/)
  output_root: null

  # true = no files written, logs only
  dry_run: false

  # true = skip human approval (TESTING ONLY)
  auto_approve: false

  # true = ignore completed-run cache, re-run from scratch
  force: false

llm:
  # null = auto-detect from environment variables
  provider: null   # anthropic | openai | openai_compat | ollama | llamacpp | subprocess

  # null = provider default (claude-opus-4-5 / gpt-4o / llama3.2)
  model: null

  # true = template-only mode, no API key required
  no_llm: false

  # Optional -- only set if needed
  base_url: null
  model_path: null
  ollama_host: null
  max_tokens: null
  temperature: null
  timeout: 180  # seconds per LLM subprocess call; 180s covers typical claude response times

  # subprocess_cmd: which CLI tool to invoke when provider is "subprocess".
  # Examples: "claude", "codex", "/usr/local/bin/my-llm"
  subprocess_cmd: null

  # subprocess_env: env vars injected into the subprocess on every call.
  # Use this to pass credentials without running `claude login` interactively.
  # Values support ${VAR} expansion — secrets stay in host env, not in this file.
  #
  # ── To authenticate claude without interactive login ──────────────────
  #   subprocess_env:
  #     ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"   # expand from host env (safest)
  #     ANTHROPIC_API_KEY: "sk-ant-api03-..."        # or hard-code (not recommended)
  #
  # ── To pass custom username / password to a local API endpoint ────────
  #   subprocess_env:
  #     LLM_USERNAME: "admin"
  #     LLM_PASSWORD: "${LLM_PASSWORD}"              # keep password in host env
  #
  subprocess_env: {}   # empty = subprocess inherits host env unchanged

notes: |
  Source:  React / ASP.NET Core
           Root: <SOURCE_ROOT>
  Target:  Next.js / Flask
           Root: <TARGET_ROOT>

  Add any context the agent or human reviewer should know:
  - Business domain of this feature
  - Known platform library dependencies that may not have target equivalents
  - Cross-feature imports that need human review
  - Expected output files
