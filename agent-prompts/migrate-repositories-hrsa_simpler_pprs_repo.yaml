# ============================================================
# AI Migration Tool -- Job File
# Feature: Repositories
# Target: hrsa-simpler-pprs (Next.js / Flask)
#
# Naming convention: migrate-<FeatureName>-hrsa_simpler_pprs_repo.yaml
#
# To run:
#   python run_agent.py --job agent-prompts/migrate-repositories-hrsa_simpler_pprs_repo.yaml
# ============================================================

job:
  name: "Migrate Repositories -> hrsa-simpler-pprs"
  description: >
    Migrate the Repositories feature from
    the legacy React / ASP.NET Core stack to
    Next.js / Flask in hrsa-simpler-pprs.

pipeline:
  # REQUIRED -- absolute path to the SPECIFIC FEATURE subfolder in the legacy
  # source codebase, NOT the entire client root.
  feature_root: "<YOUR_SOURCE_ROOT>/Application/Activities"
  feature_name: "Repositories"

  # Pipeline mode: scope | plan | full
  mode: "full"

  # Target stack identifier (registered by setup_wizard.py)
  target: "hrsa_simpler_pprs_repo"

  # Output directory (null = default output/<feature_name>/)
  # IMPORTANT: output_root is where the ConversionAgent writes its intermediate
  # output files (inside the AI Migration Tool repo), NOT the target codebase.
  # Leave as null to use the default output/<feature_name>/ folder.
  # Stage 7 (IntegrationAgent) then places those files into target_root.
  output_root: null

  # true = no files written, logs only
  dry_run: false

  # true = skip human approval (TESTING ONLY)
  auto_approve: true

  # true = ignore completed-run cache, re-run from scratch
  force: true

  # OPTIONAL — absolute path to the target codebase root.
  # Used by Stage 7 (Integration) to place converted files into the target repo.
  # Auto-populated from config/wizard-registry.json when registered via the setup wizard.
  # Set explicitly here to override, or leave null to rely on auto-population.
  # IMPORTANT: target_root must be the PARENT of the top-level path prefix used
  # in project_structure_hrsa_pprs (which starts with "frontend/...").
  # If target_root = ".../hrsa-simpler-pprs/frontend" AND plan paths also start
  # with "frontend/", files land at ".../frontend/frontend/..." (double-nesting).
  # Set target_root to the repo root so "frontend/app/..." resolves correctly.
  target_root: "<YOUR_TARGET_ROOT>"

# ── Integration (Stage 7) ──────────────────────────────────────────────────
# Runs after validation. Places output files into target_root, syncs
# dependencies, updates barrel files and __init__.py exports, verifies
# structural alignment, generates migration scripts, and optionally runs a
# post-placement build command.
integration:
  enabled: true            # set false to skip Stage 7 entirely
  add_dependencies: true   # auto-add missing Python deps to requirements.txt
  generate_migration: true # generate DB migration script if model changes detected
  update_package_json: true       # true = write missing JS packages to package.json
  update_barrel_files: true        # false = skip index.ts export updates
  update_python_inits: true        # false = skip __init__.py updates
  update_tsconfig_paths: true     # true = add path aliases to tsconfig.json (opt-in)
  post_placement_command: null     # e.g. "npm run build" — runs after all files placed
  post_placement_timeout: 300      # seconds before post_placement_command times out
  generate_playwright_stubs: true # true = emit tests/e2e/<Component>.spec.ts stubs

# ── UI Consistency Audit (Stage 6b) ───────────────────────────────────────
ui_consistency:
  enabled: true
  generate_stories: false
  fail_on_missing_classes: true

# Stage 8: command-based end-to-end verification (build/test/lint)
# Commands are auto-detected from the target codebase (package.json / pyproject.toml /
# Makefile) and verification.enabled is flipped to true automatically when found.
# Override by setting commands and enabled explicitly below.
verification:
  enabled: true           # auto-set to true when commands are auto-detected
  tool: commands           # commands (default) | playwright
  cwd: null                # null => target_root (auto-resolved); set explicitly to override
  commands: []             # leave empty for auto-detection, or specify explicitly
  env: {}
  fail_on_error: true

# ── Project structure (output file path templates) ────────────────────────
# Optional. When set, values here take precedence over the corresponding
# entries in config/skillset-config.json for the selected target.
# Omit any key to fall back to the config default for that key.
# Use {feature_name} as a placeholder for the lower-cased feature name.
#
# Uncomment and edit the sections you want to override:
#
# project_structure:
#   frontend:
#     components_root: "frontend/app/components/{feature_name}/"
#     services_root:   "frontend/app/services/"
#   backend:
#     api_root:              "backend/routes/"
#     services_root:         "backend/services/"
#     repositories_root:     "backend/repositories/"
#   database:
#     init_script: "database/init_db.py"

llm:
  # Use Codex CLI (subprocess provider). Requires `codex` on PATH and OPENAI_API_KEY.
  provider: subprocess

  # null = codex default model
  model: null

  # true = template-only mode, no API key required
  no_llm: false

  # Optional
  base_url: null
  model_path: null
  ollama_host: null
  max_tokens: null
  temperature: null

  # Codex responses can take 30–90 s; 180 s gives headroom
  timeout: 180

  subprocess_cmd: "codex"
  subprocess_args:
    - -c
    - 'reasoning_effort="medium"'

# ── Orchestration ──────────────────────────────────────────────────────────
orchestration:
  enabled: true
  learning: true
  max_plan_revisions: 2
  escalate_on_fail: true
  backend: internal
  tool_use: auto

notes: |
  Source:  React / ASP.NET Core
           Root: <YOUR_SOURCE_ROOT>/
  Target:  Next.js / Flask
           Root: <YOUR_TARGET_ROOT>/

  Feature: Repositories (source: Reactivites Application/Activities)

